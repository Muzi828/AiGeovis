# AiGeovis — ai4safe.cn
# Install:
#   sudo cp deploy/nginx-ai4safe.conf /etc/nginx/sites-available/ai4safe.cn
#   sudo ln -sf /etc/nginx/sites-available/ai4safe.cn /etc/nginx/sites-enabled/
#   # Or on CentOS/Alibaba: /etc/nginx/conf.d/ai4safe.cn.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# After certbot:
#   sudo certbot --nginx -d ai4safe.cn -d www.ai4safe.cn

server {
    listen 80;
    listen [::]:80;
    server_name ai4safe.cn www.ai4safe.cn;

    # Let's Encrypt challenge (certbot will manage HTTPS server block)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    root /var/www/aigeovis;
    index index.html;

    # Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend (docker / uvicorn on localhost:35696)
    location /api/ {
        proxy_pass http://127.0.0.1:35696/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 200m;
    }

    # OpenAPI / docs (optional; comment out in production if undesired)
    location /docs {
        proxy_pass http://127.0.0.1:35696/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:35696/openapi.json;
        proxy_set_header Host $host;
    }
}
